# BiSeNet

image_dir: ./data/image
mask_dir: ./data/mask
val_split: 0.2
input_size: 512
num_classes: 2
class_names: [background, corn]

model: bisenet
backbone: resnet18 

# BiSeNet特有参数
use_aux: true  

epochs: 200
batch_size: 8
lr: 1.0e-4
weight_decay: 5.0e-4
num_workers: 4
aux_weight: 0.4
scheduler: cosine
min_lr: 1.0e-6
patience: 30

aug_strength: strong

save_dir: ./runs/bisenet
save_freq: 10

seed: 42
device: cuda