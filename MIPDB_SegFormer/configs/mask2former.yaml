# Mask2Former

image_dir: ./data/image
mask_dir: ./data/mask
val_split: 0.2
input_size: 512
num_classes: 2
class_names: [background, corn]

model: mask2former
backbone: swin-tiny

epochs: 200
batch_size: 2
lr: 1.0e-5
weight_decay: 5.0e-2
num_workers: 4
aux_weight: 0.0
scheduler: cosine
min_lr: 1.0e-7
patience: 30

aug_strength: medium

save_dir: ./runs
save_freq: 10

seed: 42
device: cuda