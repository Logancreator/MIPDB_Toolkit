# UNet 配置

image_dir: ./data/image
mask_dir: ./data/mask
val_split: 0.2
input_size: 512
num_classes: 2
class_names: [background, corn]

model: unet
backbone: null

epochs: 200
batch_size: 32
lr: 1.0e-4
weight_decay: 1.0e-4
num_workers: 4
aux_weight: 0.0
scheduler: cosine
min_lr: 1.0e-7
patience: 30

aug_strength: strong

save_dir: ./runs/unet
save_freq: 10

seed: 42
device: cuda